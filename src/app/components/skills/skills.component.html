<section id="skills" class="min-h-screen py-20 bg-dark relative">
   <div class="container mx-auto px-6">
      <div class="text-center mb-16">
         <h2 class="text-3xl md:text-4xl font-bold text-white mb-4">Technical Skills</h2>
         <div class="w-20 h-1 bg-accent mx-auto rounded-full"></div>
         <p class="text-gray-400 mt-4 max-w-2xl mx-auto">
            My expertise spans across the full stack, enabling me to build comprehensive and scalable solutions.
         </p>
      </div>

      <div class="grid sm:grid-cols-2 lg:grid-cols-4 gap-6 sm:gap-8">
         <div *ngFor="let category of skillCategories" class="bg-white/5 backdrop-blur-sm p-6 rounded-2xl border border-white/5 hover:border-accent/30 transition-all duration-300 hover:transform hover:-translate-y-2 group">
            <div class="w-12 h-12 bg-accent/10 rounded-lg flex items-center justify-center mb-6 text-accent group-hover:bg-accent group-hover:text-dark transition-colors mx-auto sm:mx-0">
               <!-- Simple Icon Placeholder since FontAwesome isn't installed -->
               <span class="font-bold text-lg">{{ category.icon[0] | uppercase }}</span>
            </div>
            <h3 class="text-xl font-bold text-white mb-4 text-center sm:text-left">{{ category.name }}</h3>
            <ul class="space-y-2">
               <li *ngFor="let skill of category.skills" class="text-gray-400 flex items-center justify-center sm:justify-start">
                  <span class="w-1.5 h-1.5 bg-accent rounded-full mr-2"></span>
                  {{ skill }}
               </li>
            </ul>
         </div>
      </div>
   </div>
</section>
