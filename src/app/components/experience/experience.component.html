<section id="experience" class="min-h-screen py-20 bg-dark relative">
  <div class="container mx-auto px-6">
    <div class="text-center mb-16 px-4">
       <span class="text-accent font-medium tracking-widest uppercase text-sm">Resume</span>
       <h2 class="text-3xl md:text-4xl font-bold text-white mt-2 mb-4">Experience & Education</h2>
       <div class="w-20 h-1 bg-accent mx-auto rounded-full"></div>
    </div>

    <div class="grid lg:grid-cols-2 gap-16">
       <!-- Experience Column -->
       <div>
          <h3 class="text-2xl font-bold text-white mb-8 flex items-center justify-center lg:justify-start">
             <span class="w-8 h-8 rounded bg-accent/10 text-accent flex items-center justify-center mr-3 text-sm">
               💼
             </span>
             Work Experience
          </h3>
          <div class="space-y-8 border-l-2 border-white/10 ml-2 sm:ml-4 pl-6 sm:pl-8 relative">
             <div *ngFor="let job of experience" class="relative">
                <span class="absolute -left-[33px] sm:-left-[41px] top-1 w-4 h-4 sm:w-5 sm:h-5 rounded-full border-4 border-dark bg-accent"></span>
                <div class="bg-white/5 p-5 sm:p-6 rounded-xl border border-white/5 hover:border-accent/30 transition-all">
                   <span class="text-accent text-sm font-mono mb-2 block">{{ job.period }}</span>
                   <h4 class="text-lg sm:text-xl font-bold text-white">{{ job.role }}</h4>
                   <p class="text-gray-400 text-sm mb-4">{{ job.company }}</p>
                   <p class="text-gray-400 leading-relaxed text-sm">{{ job.description }}</p>
                </div>
             </div>
          </div>
       </div>

       <!-- Education Column -->
       <div class="mt-12 lg:mt-0">
          <h3 class="text-2xl font-bold text-white mb-8 flex items-center justify-center lg:justify-start">
             <span class="w-8 h-8 rounded bg-accent/10 text-accent flex items-center justify-center mr-3 text-sm">
               🎓
             </span>
             Education
          </h3>
          <div class="space-y-8 border-l-2 border-white/10 ml-2 sm:ml-4 pl-6 sm:pl-8 relative">
              <div *ngFor="let edu of education" class="relative">
                <span class="absolute -left-[33px] sm:-left-[41px] top-1 w-4 h-4 sm:w-5 sm:h-5 rounded-full border-4 border-dark bg-purple-500"></span>
                <div class="bg-white/5 p-5 sm:p-6 rounded-xl border border-white/5 hover:border-purple-500/30 transition-all">
                   <span class="text-purple-400 text-sm font-mono mb-2 block">{{ edu.year }}</span>
                   <h4 class="text-lg sm:text-xl font-bold text-white">{{ edu.degree }}</h4>
                   <p class="text-gray-400 text-sm mb-4">{{ edu.institution }}</p>
                   <p class="text-gray-400 leading-relaxed text-sm">{{ edu.description }}</p>
                </div>
             </div>
          </div>
       </div>
    </div>
    
    <div class="text-center mt-16 px-4">
       <a href="/assets/documents/Muhammed_Shaheer_C_P.pdf" target="_blank" class="w-full sm:w-auto inline-flex items-center justify-center space-x-2 px-8 py-3 bg-accent text-dark font-bold rounded-full hover:scale-105 transition-transform shadow-lg shadow-accent/20">
          <span>Download Full Resume</span>
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
             <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
          </svg>
       </a>
    </div>
  </div>
</section>
