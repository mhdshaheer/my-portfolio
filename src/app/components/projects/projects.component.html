<section id="projects" class="min-h-screen py-20 bg-dark relative">
  <div class="container mx-auto px-6">
    <div class="text-center mb-16">
      <span class="text-accent font-medium tracking-widest uppercase text-sm">Portfolio</span>
      <h2 class="text-3xl md:text-4xl font-bold text-white mt-2 mb-4">Featured Projects</h2>
      <div class="w-20 h-1 bg-accent mx-auto rounded-full"></div>
    </div>

    <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-8">
      <div *ngFor="let project of projects" class="group bg-dark border border-white/10 rounded-2xl overflow-hidden hover:border-accent/40 transition-all duration-300 hover:shadow-2xl hover:shadow-accent/10 flex flex-col">
        <!-- Project Image Placeholder -->
        <div class="h-48 w-full bg-gray-800 relative overflow-hidden">
            <img [src]="project.image" [alt]="project.title" class="absolute inset-0 w-full h-full object-cover transition-transform duration-500 group-hover:scale-110">
           <div class="absolute inset-0 bg-black/50 opacity-0 group-hover:opacity-100 transition-opacity duration-300 flex items-center justify-center space-x-4">
              <a [href]="project.githubLink" target="_blank" class="p-2 bg-white rounded-full hover:bg-accent hover:text-white transition-colors">
                 <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4" />
                 </svg>
              </a>
              <a [href]="project.demoLink" target="_blank" class="p-2 bg-white rounded-full hover:bg-accent hover:text-white transition-colors">
                 <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                 </svg>
              </a>
           </div>
        </div>
        
        <div class="p-6 flex-grow flex flex-col">
          <h3 class="text-xl font-bold text-white mb-2 group-hover:text-accent transition-colors">{{ project.title }}</h3>
          <p class="text-gray-400 text-sm mb-4 flex-grow leading-relaxed">{{ project.description }}</p>
          
          <div class="flex flex-wrap gap-2 mt-auto pt-4 border-t border-white/5">
            <span *ngFor="let tag of project.tags" class="text-xs font-mono px-2 py-1 rounded bg-white/5 text-gray-300 border border-white/5">
              {{ tag }}
            </span>
          </div>
        </div>
      </div>
    </div>
    
    <div class="text-center mt-12">
      <a href="https://github.com/mhdshaheer" target="_blank" class="inline-flex items-center space-x-2 text-white hover:text-accent transition-colors border border-white/20 hover:border-accent px-6 py-3 rounded-full">
         <span>View More on GitHub</span>
         <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3" />
         </svg>
      </a>
    </div>
  </div>
</section>
